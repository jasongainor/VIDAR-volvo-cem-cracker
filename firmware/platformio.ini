; PlatformIO build for the Teensy 4.0 CEM probe firmware (no Arduino IDE needed).
;
;   cd firmware
;   pio run              # compile
;   pio run -t upload    # compile + flash (Teensy connected over USB)
;   pio device monitor   # watch the boot banner / serial (2,000,000 baud)
;
; FlexCAN_T4 ships bundled with the Teensy core in PlatformIO, so there is no
; external library to install. The sketch lives in cem_probe/ (src_dir below).
[platformio]
src_dir = cem_probe

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
; teensy-gui drives the bundled Teensy Loader (teensy.exe + teensy_post_compile + teensy_reboot)
; that ships in PlatformIO's tool-teensy package on every OS, and auto-uploads (Automatic Mode).
; NOTE: 'teensy-cli' needs a separately-installed `teensy_loader_cli` (brew on macOS); the Windows
; tool-teensy package does NOT bundle it, so teensy-cli fails here with "not recognized". Use gui.
upload_protocol = teensy-gui
monitor_speed = 2000000
